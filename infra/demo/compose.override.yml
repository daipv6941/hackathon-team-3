# Demo deployment override.
#
# Use with:
#   docker compose -f compose.yml -f infra/demo/compose.override.yml up -d
#
# Differences from the canonical compose.yml:
#   - Drops `proxy` (Traefik): the host reverse proxy terminates TLS.
#   - Drops `clamav`: KNOWLEDGE_AV_REQUIRED=false in .env disables AV scanning.
#   - Binds `web` and `server` to host loopback so the host reverse proxy
#     can forward to them.
#   - Passes S3_* env vars to the server (root compose.yml omits these).
#   - `extra_hosts` maps the public S3 hostname to the docker host gateway,
#     so the server reaches a host-side MinIO without hairpinning through
#     the public IP. S3_PUBLIC_HOST must match the hostname in S3_ENDPOINT.

name: seta

services:
  proxy: !reset null
  clamav: !reset null

  server:
    depends_on:
      clamav: !reset null
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    ports:
      - "127.0.0.1:${SETA_SERVER_HOST_PORT:-13000}:3000"
    extra_hosts:
      - "${S3_PUBLIC_HOST}:host-gateway"

  worker:
    depends_on:
      clamav: !reset null
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    extra_hosts:
      - "${S3_PUBLIC_HOST}:host-gateway"

  web:
    ports:
      - "127.0.0.1:${SETA_WEB_HOST_PORT:-18080}:8080"
