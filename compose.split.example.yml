# ─────────────────────────────────────────────────────────────────────────────
#  EXAMPLE — NOT A SUPPORTED CONFIGURATION
#
#  This file demonstrates the split-mode deploy topology described in the
#  deployment strategy spec (§5.2). It is provided as a worked example for
#  users who want per-module scaling (typically driven by an LLM-bound module
#  like `copilot` outgrowing the all-in-one container).
#
#  THIS FILE IS NOT TESTED. It depends on Layer 3 (the dispatch shim + Hono
#  RPC mount) which lands separately. The peer URLs below are documented but
#  the shim must exist before they have any effect.
#
#  When using this file:
#    1. Copy to `compose.split.yml` and edit. Do not invoke this file directly.
#    2. Add the proxy + postgres + web services from `compose.yml` to your copy
#       (omitted here for brevity — focus is on the split shape).
#    3. Read `docs/hosting/scaling.md` (Layer 2) for the decision criteria
#       BEFORE running this.
# ─────────────────────────────────────────────────────────────────────────────

name: seta-split

services:
  # The gateway loads core + identity. It owns the public ingress side of the
  # API (Traefik routes /api/* to it) AND it owns core.events dispatch — only
  # the container that loads `core` runs the LISTEN/NOTIFY pump and the 2s
  # fallback poll. See spec §6, `core.events ownership when modules split`.
  gateway:
    image: ${SETA_IMAGE_SERVER:-ghcr.io/seta-io/seta-server:${SETA_VERSION:-latest}}
    command: ["serve"]
    environment:
      SETA_MODULES: "core,identity"
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_URL: ${PUBLIC_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # Peer URLs — the dispatch shim (Layer 3) uses these to find sibling
      # modules. URL format is the Hono RPC mount: http://<host>:<port>/_rpc/<module>
      SETA_PEERS_PLANNER: "http://planner:3000/_rpc/planner"
      SETA_PEERS_COPILOT: "http://copilot:3000/_rpc/copilot"
      # Shared bearer secret for peer-to-peer auth on this internal network.
      # In ECS production this is replaced by mTLS via AWS PCA — see Layer 4.
      SETA_RPC_SHARED_SECRET: ${SETA_RPC_SHARED_SECRET}

  # The planner module. Subscribes to identity.user_* events (cross-process
  # delivery is automatic — they're rows in core.events read via LISTEN/NOTIFY).
  # Local read-model projections (planner.user_projection) live in planner's
  # own schema; no cross-schema FK back to identity.users.
  planner:
    image: ${SETA_IMAGE_SERVER:-ghcr.io/seta-io/seta-server:${SETA_VERSION:-latest}}
    command: ["serve"]
    environment:
      SETA_MODULES: "planner"
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_URL: ${PUBLIC_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # Planner calls back into identity for some sync reads. The shim
      # routes these via Hono RPC since `identity` is not loaded here.
      SETA_PEERS_IDENTITY: "http://gateway:3000/_rpc/identity"
      SETA_PEERS_CORE: "http://gateway:3000/_rpc/core"
      SETA_RPC_SHARED_SECRET: ${SETA_RPC_SHARED_SECRET}

  # The copilot (agent runtime) module. This is the most common candidate for
  # splitting out — LLM I/O bursts cause memory/CPU pressure independent of
  # the rest of the stack. HITL approval cards round-trip via RPC + event
  # back to the gateway (spec §6).
  copilot:
    image: ${SETA_IMAGE_SERVER:-ghcr.io/seta-io/seta-server:${SETA_VERSION:-latest}}
    command: ["serve"]
    environment:
      SETA_MODULES: "copilot"
      DATABASE_URL: ${DATABASE_URL}
      PUBLIC_URL: ${PUBLIC_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      SETA_PEERS_IDENTITY: "http://gateway:3000/_rpc/identity"
      SETA_PEERS_PLANNER: "http://planner:3000/_rpc/planner"
      SETA_PEERS_CORE: "http://gateway:3000/_rpc/core"
      SETA_RPC_SHARED_SECRET: ${SETA_RPC_SHARED_SECRET}

  # Each container migrates only its own schemas. Order between containers is
  # unconstrained because CLAUDE.md forbids cross-schema FKs.
  migrator-gateway:
    image: ${SETA_IMAGE_SERVER:-ghcr.io/seta-io/seta-server:${SETA_VERSION:-latest}}
    command: ["migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SETA_MODULES: "core,identity"
    restart: "no"

  migrator-planner:
    image: ${SETA_IMAGE_SERVER:-ghcr.io/seta-io/seta-server:${SETA_VERSION:-latest}}
    command: ["migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SETA_MODULES: "planner"
    restart: "no"

  migrator-copilot:
    image: ${SETA_IMAGE_SERVER:-ghcr.io/seta-io/seta-server:${SETA_VERSION:-latest}}
    command: ["migrate"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SETA_MODULES: "copilot"
    restart: "no"
